<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合歡山松雪樓 · 空房查詢</title>
<link rel="stylesheet" href="/static/css/style.css?v=2.3.0">
</head>
<body>

<header>
  <h1>&#x1F3D4;&#xFE0F; 合歡山松雪樓 · 空房查詢</h1>
  <p>資料來源：booking.taiwantravelmap.com</p>
</header>

<div class="container">
  <div class="controls">
    <label>入住日期</label>
    <input type="date" id="startDate">
    <label>退房日期</label>
    <input type="date" id="endDate">
    <button id="searchBtn">&#x1F50D; 查詢</button>
    <div class="range-hint">可訂範圍：明天 ~ 30 天後</div>
  </div>

  <div class="cache-badge" id="cacheBadge" style="display:none">
    <span>&#x1F504; 上次查詢: <span id="lastScanTime"></span></span>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <span class="progress-text" id="progressText"></span>
  </div>

  <div class="status" id="status"></div>

  <div class="calendar-wrap" id="calendarWrap" style="display:none">
    <div class="calendar-header">
      <span id="monthLabel"></span>
      <div class="calendar-nav">
        <button id="prevMonth">&lsaquo;</button>
        <button id="nextMonth">&rsaquo;</button>
      </div>
    </div>
    <div class="calendar-grid" id="calendarGrid">
      <div class="day-name">日</div><div class="day-name">一</div>
      <div class="day-name">二</div><div class="day-name">三</div>
      <div class="day-name">四</div><div class="day-name">五</div>
      <div class="day-name">六</div>
    </div>
    <div class="legend">
      <span><span style="color:var(--green)">●</span> 有空房</span>
      <span><span style="color:var(--red)">&#x2715;</span> 已售完</span>
      <span><span style="color:var(--amber)">&#x25CC;</span> 未查詢</span>
    </div>
  </div>

  <div class="detail-panel" id="detailPanel">
    <div class="dp-header">
      <span id="detailDate"></span>
      <span id="detailStatus"></span>
    </div>
    <div class="dp-body" id="detailBody"></div>
  </div>

  <div class="db-tools">
    <span class="db-tools-label">&#x1F4BE; 資料庫</span>
    <button id="dbExportBtn" title="下載 scans.db">&#x2B07; 下載</button>
    <button id="dbImportBtn" title="上傳 .db 取代目前資料庫">&#x2B06; 上傳</button>
    <input type="file" id="dbFileInput" accept=".db" style="display:none">
    <span class="db-tools-status" id="dbToolsStatus"></span>
  </div>

  <div class="profile-panel" id="profilePanel">
    <div class="profile-header" id="profileToggle">
      <span>&#x1F464; 設定訂房資料</span>
      <span class="profile-arrow">&#x25B6;</span>
    </div>
    <div class="profile-body" id="profileBody">
      <div class="profile-section">
        <div class="profile-row">
          <label>姓 *</label>
          <input type="text" id="pf_lastName" maxlength="20">
          <label>名 *</label>
          <input type="text" id="pf_firstName" maxlength="20">
        </div>
        <div class="profile-row">
          <label>性別</label>
          <label class="radio-inline"><input type="radio" name="pf_sex" value="0" checked> 男</label>
          <label class="radio-inline"><input type="radio" name="pf_sex" value="1"> 女</label>
          <label>生日</label>
          <select id="pf_birthYear"></select>
          <span>年</span>
          <select id="pf_birthMonth"></select>
          <span>月</span>
          <select id="pf_birthDay"></select>
          <span>日</span>
        </div>
        <div class="profile-row">
          <label>證件類別</label>
          <label class="radio-inline"><input type="radio" name="pf_idType" value="0" checked> 身分證</label>
          <label class="radio-inline"><input type="radio" name="pf_idType" value="1"> 護照</label>
          <label>證件號碼 *</label>
          <input type="text" id="pf_idNumber" maxlength="50">
        </div>
        <div class="profile-row">
          <label>Email *</label>
          <input type="text" id="pf_email" maxlength="300">
          <label>手機 *</label>
          <input type="text" id="pf_phone" maxlength="19">
        </div>
        <div class="profile-row">
          <label>地址</label>
          <input type="text" id="pf_address">
          <label>入住時間</label>
          <select id="pf_checkinTime">
            <option value="15:00">15:00</option>
            <option value="15:30">15:30</option>
            <option value="16:00">16:00</option>
            <option value="16:30">16:30</option>
            <option value="17:00">17:00</option>
          </select>
        </div>
        <div class="profile-row">
          <label>查詢密碼 *</label>
          <input type="password" id="pf_password" maxlength="10">
          <label class="checkbox-inline"><input type="checkbox" id="pf_showPw"> 顯示</label>
        </div>
        <div class="profile-row">
          <label>備註</label>
          <textarea id="pf_note" rows="2"></textarea>
        </div>
      </div>
      <div class="profile-actions">
        <button id="pf_saveBtn">&#x1F4BE; 儲存</button>
        <button id="pf_clearBtn">&#x1F5D1; 清除</button>
        <span class="profile-status" id="pf_status"></span>
      </div>
      <div class="profile-bookmarklet" id="pf_bookmarkletArea" style="display:none">
        <p>&#x1F517; 將下方連結拖曳到書籤列，在訂房頁面點擊即可自動填入：</p>
        <div class="bookmarklet-box">
          <a id="pf_bookmarkletLink" href="javascript:void(0)" target="_blank">&#x1F4CB; 松雪樓快速訂房</a>
        </div>
        <p class="profile-hint">若無法拖曳，可手動複製下方代碼，新增書籤時貼到網址欄：</p>
        <textarea id="pf_bookmarkletCode" readonly rows="3"></textarea>
      </div>
    </div>
  </div>
</div>

<footer>
  <small>commit: <span id="commitHash">...</span></small>
</footer>

<script src="/static/js/app.js?v=2.3.0"></script>
</body>
</html>
